<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Login — LIF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --verde: #00e676;
      --oscuro: #0a0e14;
      --panel: #111720;
      --borde: rgba(255,255,255,0.07);
      --texto: #e8edf5;
      --texto-dim: #7a8a9e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--oscuro);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Glow backdrop */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,230,118,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Flash */
    #flash-container {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      pointer-events: none;
      width: 340px;
    }
    .flash-message {
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-12px);
      transition: all .4s ease;
      margin-bottom: 8px;
    }
    .flash-success { background: rgba(0,230,118,.15); color: var(--verde); border: 1px solid rgba(0,230,118,.3); }
    .flash-warning, .flash-danger { background: rgba(231,76,60,.12); color: #e74c3c; border: 1px solid rgba(231,76,60,.25); }
    .flash-info { background: rgba(93,173,226,.12); color: #5dade2; border: 1px solid rgba(93,173,226,.25); }

    /* Card */
    .auth-card {
      background: var(--panel);
      border: 1px solid var(--borde);
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: .1em;
      color: #fff;
    }
    .auth-logo span em { color: var(--verde); font-style: normal; }
    .auth-logo p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--texto-dim);
      margin-top: 4px;
    }

    /* Title */
    .auth-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #fff;
      margin-bottom: 28px;
      text-align: center;
    }

    /* Inputs */
    .auth-field {
      margin-bottom: 14px;
      position: relative;
    }
    .auth-field input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--borde);
      border-radius: 9px;
      padding: 13px 16px;
      font-family: 'Barlow', sans-serif;
      font-size: .95rem;
      color: var(--texto);
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .auth-field input::placeholder { color: var(--texto-dim); }
    .auth-field input:focus {
      border-color: rgba(0,230,118,.4);
      background: rgba(255,255,255,.06);
    }
    .auth-field input.is-valid   { border-color: var(--verde); }
    .auth-field input.is-invalid { border-color: #e74c3c; }

    .password-toggle {
      position: absolute;
      top: 50%; right: 14px;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--texto-dim);
      font-size: 1.05rem;
      transition: color .2s;
    }
    .password-toggle:hover { color: var(--texto); }

    /* Submit btn */
    .btn-auth {
      width: 100%;
      margin-top: 8px;
      background: var(--verde);
      color: #0a0e14;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: none;
      border-radius: 9px;
      padding: 13px;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 0 20px rgba(0,230,118,.2);
    }
    .btn-auth:hover {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(0,230,118,.35);
    }

    /* Links */
    .auth-links {
      margin-top: 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .auth-links p {
      font-size: .88rem;
      color: var(--texto-dim);
      margin: 0;
    }
    .auth-link {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .88rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--verde);
      text-decoration: none;
      transition: opacity .2s;
    }
    .auth-link:hover { opacity: .75; color: var(--verde); }
    .auth-link-ghost {
      font-size: .82rem;
      color: var(--texto-dim);
      text-decoration: none;
      transition: color .2s;
    }
    .auth-link-ghost:hover { color: var(--texto); }

    /* Divider */
    .auth-divider {
      height: 1px;
      background: var(--borde);
      margin: 14px 0;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 36px 24px; border-radius: 14px; }
    }
  </style>
</head>

<body>

  <div id="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
  </div>

  <form method="POST" class="auth-card">

    <div class="auth-logo">
      <span>L<em>I</em>F</span>
      <p>Liga Interprovincial de Fútbol</p>
    </div>

    <h2 class="auth-title">Iniciar sesión</h2>

    <div class="auth-field">
      <input type="email" name="email" placeholder="Email" required>
    </div>

    <div class="auth-field">
      <input type="password" id="password" name="password" placeholder="Contraseña" required style="padding-right: 44px;">
      <i class="bi bi-eye password-toggle" data-target="password"></i>
    </div>

    <button type="submit" class="btn-auth">Ingresar</button>

    <div class="auth-links">
      <p>¿No tenés cuenta? <a href="{{ url_for('views.register') }}" class="auth-link">Creá una</a></p>
      <div class="auth-divider"></div>
      <a href="{{ url_for('views.index') }}" class="auth-link-ghost">Entrar sin iniciar sesión →</a>
    </div>

  </form>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".flash-message").forEach(f => {
        setTimeout(() => { f.style.opacity = "1"; f.style.transform = "translateY(0)"; }, 100);
        setTimeout(() => { f.style.opacity = "0"; f.style.transform = "translateY(-12px)"; setTimeout(() => f.remove(), 400); }, 3200);
      });
      document.querySelectorAll(".password-toggle").forEach(icon => {
        icon.addEventListener("click", () => {
          const input = document.getElementById(icon.dataset.target);
          input.type = input.type === "password" ? "text" : "password";
          icon.classList.toggle("bi-eye");
          icon.classList.toggle("bi-eye-slash");
        });
      });
    });
  </script>

</body>
</html>
