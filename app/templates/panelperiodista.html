<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Panel del Periodista — LIF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #00e676;
      --verde-dim: rgba(0,230,118,.1);
      --oscuro: #0a0e14;
      --panel: #111720;
      --panel-2: #161d28;
      --borde: rgba(255,255,255,0.07);
      --texto: #e8edf5;
      --texto-dim: #7a8a9e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--oscuro);
      color: var(--texto);
      min-height: 100vh;
      padding-bottom: 60px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,230,118,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 64px;
      border-bottom: 1px solid var(--borde);
      background: rgba(10,14,20,.9);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: .1em;
      color: #fff;
      text-decoration: none;
    }
    .topbar-logo em { color: var(--verde); font-style: normal; }

    .topbar-actions { display: flex; gap: 10px; }
    .topbar-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 7px 18px;
      border-radius: 7px;
      border: 1px solid var(--borde);
      color: var(--texto-dim);
      background: rgba(255,255,255,.04);
      transition: color .2s, border-color .2s, background .2s;
    }
    .topbar-btn:hover {
      color: #fff;
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
    }
    .topbar-btn.danger:hover {
      color: #e74c3c;
      border-color: rgba(231,76,60,.35);
      background: rgba(231,76,60,.07);
    }

    /* ─── PAGE ─── */
    .panel-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 52px 2rem;
      position: relative;
      z-index: 1;
    }

    /* ─── HEADER ─── */
    .panel-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--verde);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .panel-eyebrow::before {
      content: '';
      display: inline-block;
      width: 28px; height: 1px;
      background: var(--verde);
      opacity: .5;
    }
    .panel-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .02em;
      color: #fff;
      line-height: 1;
      margin-bottom: 52px;
    }
    .panel-title span { color: var(--verde); }

    /* ─── SECTION ─── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--texto-dim);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--borde);
    }

    /* ─── GRID ─── */
    .panel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 52px;
    }

    /* ─── ACTION CARD ─── */
    .action-card {
      display: block;
      text-decoration: none;
      background: var(--panel);
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 28px 24px;
      transition: transform .22s, border-color .22s, box-shadow .22s, background .22s;
      position: relative;
      overflow: hidden;
    }
    .action-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,230,118,.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .22s;
    }
    .action-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0,230,118,.28);
      box-shadow: 0 14px 36px rgba(0,0,0,.35), 0 0 0 1px rgba(0,230,118,.12);
      background: var(--panel-2);
    }
    .action-card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 14px;
      line-height: 1;
    }
    .card-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #fff;
      line-height: 1.2;
      position: relative;
      z-index: 1;
      transition: color .2s;
    }
    .action-card:hover .card-label { color: var(--verde); }
    .card-desc {
      font-size: .82rem;
      color: var(--texto-dim);
      margin-top: 6px;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 1.2rem; }
      .panel-page { padding: 36px 1rem; }
      .panel-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .action-card { padding: 22px 16px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <a href="{{ url_for('views.index') }}" class="topbar-logo">L<em>I</em>F</a>
    <div class="topbar-actions">
      <a href="{{ url_for('views.index') }}" class="topbar-btn">Inicio</a>
      <a href="{{ url_for('views.logout') }}" class="topbar-btn danger">Cerrar sesión</a>
    </div>
  </header>

  <div class="panel-page">

    <p class="panel-eyebrow">Acceso restringido</p>
    <h1 class="panel-title">Panel del <span>Periodista</span></h1>

    <p class="section-label">Gestión de contenido</p>
    <div class="panel-grid">

      <a href="{{ url_for('views.cargar_noticia') }}" class="action-card">
        <span class="card-icon">📰</span>
        <div class="card-label">Cargar Noticias</div>
        <p class="card-desc">Publicá una nueva nota en el sitio de la liga</p>
      </a>

      <a href="{{ url_for('views.cargar_video') }}" class="action-card">
        <span class="card-icon">🎬</span>
        <div class="card-label">Cargar Videos</div>
        <p class="card-desc">Agregá un video de YouTube al feed de multimedia</p>
      </a>

    </div>

  </div>

</body>
</html>
